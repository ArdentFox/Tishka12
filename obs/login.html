<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        /* Те же стили, что и в register.html */
        body { font-family: Arial, sans-serif; background: #f0f0f0; }
        .container { max-width: 400px; margin: 50px auto; padding: 20px; background: white; border-radius: 10px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #008CBA; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .message { margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Вход</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
        <div id="message" class="message"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const savedUser = JSON.parse(localStorage.getItem('user'));

            if (savedUser && savedUser.email === email && savedUser.password === password) {
                document.getElementById('message').textContent = 'Вход успешен! Добро пожаловать, ' + savedUser.username + '!';
            } else {
                document.getElementById('message').textContent = 'Неверный email или пароль!';
            }
        });
    </script>
</body>
</html>
